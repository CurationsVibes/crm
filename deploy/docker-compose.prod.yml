# Production Docker Compose for CurationsVibes CRM
# Cloudflare Tunnel handles SSL termination — no inbound ports need to be opened.
#
# Quick start:
#   cp .env.prod.example .env.prod
#   # Edit .env.prod — fill in ALL required values (marked with REQUIRED)
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# See README.md for the full runbook.

name: curations-crm

services:

  # ─── Application server (API + frontend) ────────────────────────────────────
  server:
    image: twentycrm/twenty:${TAG:-latest}
    restart: unless-stopped
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    expose:
      - "3000"
    environment:
      NODE_PORT: 3000
      NODE_ENV: production

      SERVER_URL: ${SERVER_URL}
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD}@db:5432/default
      REDIS_URL: redis://redis:6379
      APP_SECRET: ${APP_SECRET}

      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-}
      STORAGE_S3_NAME: ${STORAGE_S3_NAME:-}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}
      STORAGE_S3_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-}
      STORAGE_S3_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-}

      # Email via Resend SMTP
      EMAIL_DRIVER: smtp
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      EMAIL_SMTP_HOST: smtp.resend.com
      EMAIL_SMTP_PORT: 465
      EMAIL_SMTP_USER: resend
      EMAIL_SMTP_PASSWORD: ${RESEND_API_KEY}
      IS_EMAIL_VERIFICATION_REQUIRED: ${IS_EMAIL_VERIFICATION_REQUIRED:-true}

      # AI — Claude/Anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Workspace controls
      IS_WORKSPACE_CREATION_LIMITED_TO_SERVER_ADMINS: ${IS_WORKSPACE_CREATION_LIMITED_TO_SERVER_ADMINS:-true}
      IS_MULTIWORKSPACE_ENABLED: ${IS_MULTIWORKSPACE_ENABLED:-true}

      # Auth
      AUTH_PASSWORD_ENABLED: ${AUTH_PASSWORD_ENABLED:-true}
      AUTH_GOOGLE_ENABLED: ${AUTH_GOOGLE_ENABLED:-false}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID:-}
      AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET:-}
      AUTH_GOOGLE_CALLBACK_URL: ${SERVER_URL}/auth/google/redirect
      AUTH_GOOGLE_APIS_CALLBACK_URL: ${SERVER_URL}/auth/google-apis/get-access-token

      # Cloudflare variables used by built-in Cloudflare integrations (optional)
      CLOUDFLARE_API_KEY: ${CLOUDFLARE_API_KEY:-}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
      CLOUDFLARE_WEBHOOK_SECRET: ${CLOUDFLARE_WEBHOOK_SECRET:-}

      # Rate limiting
      API_RATE_LIMITING_TTL: ${API_RATE_LIMITING_TTL:-1000}
      API_RATE_LIMITING_LIMIT: ${API_RATE_LIMITING_LIMIT:-500}

      DISABLE_DB_MIGRATIONS: "false"
      DISABLE_CRON_JOBS_REGISTRATION: "false"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          cpus: "0.25"
          memory: 512M

  # ─── Background worker (BullMQ) ─────────────────────────────────────────────
  worker:
    image: twentycrm/twenty:${TAG:-latest}
    restart: unless-stopped
    command: ["yarn", "worker:prod"]
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    environment:
      NODE_ENV: production

      SERVER_URL: ${SERVER_URL}
      PG_DATABASE_URL: postgres://${PG_DATABASE_USER:-postgres}:${PG_DATABASE_PASSWORD}@db:5432/default
      REDIS_URL: redis://redis:6379
      APP_SECRET: ${APP_SECRET}

      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-}
      STORAGE_S3_NAME: ${STORAGE_S3_NAME:-}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}
      STORAGE_S3_ACCESS_KEY_ID: ${STORAGE_S3_ACCESS_KEY_ID:-}
      STORAGE_S3_SECRET_ACCESS_KEY: ${STORAGE_S3_SECRET_ACCESS_KEY:-}

      # Email via Resend SMTP
      EMAIL_DRIVER: smtp
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      EMAIL_SMTP_HOST: smtp.resend.com
      EMAIL_SMTP_PORT: 465
      EMAIL_SMTP_USER: resend
      EMAIL_SMTP_PASSWORD: ${RESEND_API_KEY}

      # AI — Claude/Anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"

    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  # ─── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: default
      POSTGRES_USER: ${PG_DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_DATABASE_USER:-postgres} -d default"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["--maxmemory-policy", "noeviction", "--maxmemory", "128mb", "--save", "60", "1"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M
        reservations:
          cpus: "0.05"
          memory: 64M

  # ─── Cloudflare Tunnel ──────────────────────────────────────────────────────
  # Routes crm.curations.org (and crm.curationsla.com) → http://server:3000
  # No inbound firewall ports required.
  # Obtain your token: Cloudflare Zero Trust → Networks → Tunnels → Create Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

volumes:
  db-data:
  redis-data:
  server-local-data:
